openapi: "3.1.0"
info:
  title: Third Arm API
  version: "0.1.0"
  description: |
    REST northbound contract for the Third Arm intent-driven handover service.
    Stage 1 — operator-triggered, mock hardware.
  contact:
    name: Third Arm Team

# TODO: replace localhost with real base URL before staging/production deploy
servers:
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: health
  - name: status
  - name: session
  - name: arm
  - name: handover
  - name: artifacts

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness check
      operationId: getHealth
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /status:
    get:
      tags: [status]
      summary: Arm state and active session info
      operationId: getStatus
      responses:
        "200":
          description: Current status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /session/start:
    post:
      tags: [session]
      summary: Begin a new handover session
      operationId: startSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionStartRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "404":
          description: Unknown object_id or slot_id
        "409":
          description: Session already active or arm not in valid state
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /session/stop:
    post:
      tags: [session]
      summary: End or abort current session
      operationId: stopSession
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStopResponse"
        "404":
          description: No active session

  /arm/home:
    post:
      tags: [arm]
      summary: Command arm to home position
      operationId: armHome
      responses:
        "202":
          description: Home command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArmHomeResponse"
        "409":
          description: Command rejected in current arm state

  /handover/request:
    post:
      tags: [handover]
      summary: Trigger object handover
      operationId: handoverRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandoverRequest"
      responses:
        "202":
          description: Handover completed (Stage 1 synchronous mock)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandoverResponse"
        "404":
          description: Unknown object_id or slot_id
        "409":
          description: No active session or arm not ready
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /artifacts:
    get:
      tags: [artifacts]
      summary: List session bundles
      operationId: listArtifacts
      responses:
        "200":
          description: List of session bundle directories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactsResponse"

  /artifacts/{session_id}:
    get:
      tags: [artifacts]
      summary: Inspect a single session bundle
      operationId: getArtifact
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            example: "session_20260404_abc123"
          description: |
            Opaque session bundle identifier. Must match pattern [A-Za-z0-9][A-Za-z0-9._-]*.
            Unsafe values (path traversal, slashes, dots-only) are rejected with 404.
      responses:
        "200":
          description: |
            Bundle metadata and file inventory. Returned even for incomplete or broken
            bundles — use the `errors` field to distinguish broken from healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDetailResponse"
        "404":
          description: Session bundle not found or session_id is unsafe
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, ts, message]
      properties:
        ok:      { type: boolean, example: true }
        ts:      { type: string, format: date-time }
        message: { type: string, example: ok }

    StatusResponse:
      type: object
      required: [ts, arm_state, session_id, uptime_s, mock_mode]
      properties:
        ts:         { type: string, format: date-time }
        arm_state:  { type: string, example: idle }
        session_id:
          type: [string, "null"]
        uptime_s:   { type: number }
        mock_mode:  { type: boolean }

    ArmHomeResponse:
      type: object
      required: [accepted, new_state]
      properties:
        accepted:  { type: boolean, example: true }
        new_state: { type: string, example: ready }

    SessionStartRequest:
      type: object
      properties:
        operator_id: { type: string, example: "operator-01" }
        object_id:
          anyOf:
            - type: string
            - type: "null"
          example: "obj_water_bottle_500ml"
        slot_id:
          anyOf:
            - type: string
            - type: "null"
          example: "slot_A"
        notes:       { type: string, default: "" }

    SessionResponse:
      type: object
      required: [session_id, started_at, operator_id]
      properties:
        session_id:  { type: string }
        started_at:  { type: string, format: date-time }
        operator_id: { type: string }

    SessionStopResponse:
      type: object
      required: [session_id, stopped_at, status]
      properties:
        session_id: { type: string }
        stopped_at: { type: string, format: date-time }
        status:     { type: string, example: stopped }

    HandoverRequest:
      type: object
      required: [object_id, slot_id]
      properties:
        object_id: { type: string }
        slot_id:   { type: string }

    HandoverResponse:
      type: object
      required: [handover_id, object_id, slot_id, completed_at, status]
      properties:
        handover_id:  { type: string }
        object_id:    { type: string }
        slot_id:      { type: string }
        completed_at: { type: string, format: date-time }
        status:       { type: string, example: complete }

    ArtifactsResponse:
      type: object
      required: [bundles, count]
      properties:
        bundles:
          type: array
          items:
            type: object
            required: [session_id, path, size_bytes]
            properties:
              session_id: { type: string }
              path:       { type: string }
              size_bytes: { type: integer }
        count: { type: integer }

    ArtifactDetailResponse:
      type: object
      required:
        - session_id
        - schema_version
        - created_at
        - closed_at
        - is_closed
        - presence
        - files
        - trace_summary
        - errors
      properties:
        session_id:     { type: string }
        schema_version:
          type: [string, "null"]
          example: "1.0"
        created_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        closed_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        is_closed:      { type: boolean }
        presence:
          $ref: "#/components/schemas/PresenceFlags"
        files:
          type: array
          items:
            $ref: "#/components/schemas/BundleFileEntry"
        trace_summary:
          $ref: "#/components/schemas/TraceSummary"
        errors:
          type: array
          items: { type: string }
          description: |
            Machine-readable inspection errors. Empty for healthy bundles.
            Known values: manifest_missing, manifest_unreadable, trace_unreadable.

    PresenceFlags:
      type: object
      description: Indicates which expected bundle files are present on disk.
      required: [manifest, trace, telemetry]
      properties:
        manifest:  { type: boolean }
        trace:     { type: boolean }
        telemetry: { type: boolean }

    BundleFileEntry:
      type: object
      required: [name, category, exists]
      properties:
        name:       { type: string, example: "manifest.json" }
        category:   { type: string, example: "manifest", enum: [manifest, trace, telemetry] }
        exists:     { type: boolean }
        size_bytes: { type: integer, description: "Present only when exists is true" }

    TraceSummary:
      type: object
      required: [event_count]
      properties:
        event_count: { type: integer }

    HTTPValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            anyOf:
              - type: string
              - type: integer
        msg:  { type: string }
        type: { type: string }
